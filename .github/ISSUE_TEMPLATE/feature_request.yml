name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem first, then the proposed solution. Concrete use cases help a lot.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do today, and what makes it hard?
      placeholder: I'm trying to ... but Whisper currently ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Whisper do? CLI flag, new command, server endpoint, UI change, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or thought about, and why they didn't fit.

  - type: dropdown
    id: component
    attributes:
      label: Component
      multiple: true
      options:
        - CLI (whisper-secrets)
        - Server (whisper-server)
        - Slack integration
        - Discord integration
        - Web UI
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, related issues.
