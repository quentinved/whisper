name: Bug report
description: Something isn't working the way it should
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. The more reproducible the issue, the faster it gets fixed.

        **Security issues:** please do not report them here — see [SECURITY.md](https://github.com/quentinved/Whisper/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I ran `whisper-secrets push`, it printed ... but I expected ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code that reliably reproduces the bug.
      placeholder: |
        1. `whisper-secrets init`
        2. `whisper-secrets push FOO`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Whisper version
      description: Output of `whisper-secrets --version` or the server version / commit SHA.
      placeholder: "0.4.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      multiple: true
      options:
        - CLI (whisper-secrets)
        - Server (whisper-server)
        - Slack integration
        - Discord integration
        - Web UI
        - Docs
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Run with `-v` if relevant. Redact any real secrets.
      render: shell
